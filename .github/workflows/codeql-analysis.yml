# ghas-management-template-version: 1.1

name: "CodeQL Advanced Security Scanning"

on:
  # Initial proposal is daily runs to avoid overloading runners, teams can uncomment below to enable on push and PR events
  #  push:
  #    branches: [ "main", "master" ]
  #  pull_request:
  #    branches: [ "main", "master" ]
  schedule:
    - cron: '56 3 * * *' # Randomized per repository, daily runs somewhere between 22:00 and 06:00 UTC
  workflow_dispatch:

env:
  ARTIFACTORY_PASSWORD: ${{ secrets.EE_ARTIFACTORY_PASSWORD }}
  ARTIFACTORY_URL: ${{ secrets.EE_ARTIFACTORY_URL }}
  ARTIFACTORY_USERNAME: ${{ secrets.EE_ARTIFACTORY_USERNAME }}
  VAULT_ROLE_ID: ${{ secrets.VAULT_ROLE_ID }}
  VAULT_SECRET_ID: ${{ secrets.VAULT_SECRET_ID }}

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
      packages: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none
          - language: java-kotlin
            build-mode: manual
    # For languages that require build, teams must specify the container in which CodeQL will run; if language does not require build this section is removed by automation
    container:
      image: 'bellsoft/liberica-openjre-debian:17' # Teams should adapt, should be in the format 'eu.gcr.io/halfpipe-io/build-image'

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2


      - name: Initialize CodeQL
        uses: github/codeql-action/init@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          packs: springernature/http4k-poc-models@1.0.0

      - name: Build app
        if: matrix.build-mode == 'manual'
        shell: bash
        run: |
          find . -name 'build.gradle*' -exec bash -c 'cd $(dirname {} ); [[ -f ./gradle.properties ]] && sed -i "s/^org.gradle.caching=true/org.gradle.caching=false/" ./gradle.properties; [[ -f ./gradle.properties ]] && sed -i "s/^org.gradle.jvmargs=.*/org.gradle.jvmargs=-Xmx6g/" ./gradle.properties; echo "kotlin.daemon.jvmargs=-Xmx4g" >> ./gradle.properties; ./gradlew -x build test' \;
        # Teams must specify the build command for their application; if language does not require build this step is removed by automation

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
        with:
          category: "/language:${{matrix.language}}"
          threads: 2
